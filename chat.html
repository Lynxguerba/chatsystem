<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat | Chatly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    /* Custom scrollbar for a cleaner look */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #e2e8f0;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #cbd5e1;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 h-screen flex overflow-hidden font-sans transition-colors duration-300">

  <!-- Sidebar -->
  <aside id="sidebar" class="w-full md:w-80 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 flex flex-col z-20 transition-all duration-300 fixed inset-y-0 left-0 md:relative transform -translate-x-full md:translate-x-0">
    <!-- Sidebar Header -->
    <div class="p-4 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between">
      <div class="flex items-center space-x-3">
        <img id="myAvatar" src="" alt="Me" class="w-10 h-10 rounded-full border border-gray-200 dark:border-gray-600 object-cover cursor-pointer hover:opacity-80 transition-opacity" />
        <div>
          <h2 id="myName" class="text-sm font-bold text-gray-800 dark:text-gray-100"></h2>
          <p class="text-xs text-green-500 font-medium">Online</p>
        </div>
      </div>
      <div class="flex items-center space-x-1">
        <button id="themeToggle" class="p-2 text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" title="Toggle Theme">
          <svg id="sunIcon" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
          </svg>
          <svg id="moonIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
          </svg>
        </button>
        <button id="logoutBtn" class="p-2 text-gray-400 hover:text-red-500 transition-colors" title="Logout">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path>
          </svg>
        </button>
      </div>
    </div>

    <!-- Search -->
    <div class="p-4">
      <div class="relative">
        <input type="text" id="contactSearch" placeholder="Search contacts..." 
          class="w-full bg-gray-100 dark:bg-gray-700 border-none rounded-xl py-2 px-4 pl-10 text-sm focus:ring-2 focus:ring-indigo-500 dark:text-gray-100 dark:placeholder-gray-400 transition-all" />
        <svg class="w-4 h-4 text-gray-400 absolute left-3 top-2.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </div>
    </div>

    <!-- Contact List -->
    <div id="contactList" class="flex-1 overflow-y-auto custom-scrollbar p-2 space-y-1">
      <!-- Contacts will be injected here -->
    </div>
  </aside>

  <!-- Profile Modal -->
  <div id="profileModal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden backdrop-blur-sm p-4">
    <div class="bg-white dark:bg-gray-800 w-full max-w-sm rounded-3xl shadow-2xl p-6 sm:p-8 transform transition-all scale-95 opacity-0 duration-300" id="profileModalContent">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-xl font-bold text-gray-800 dark:text-gray-100">Profile Settings</h2>
        <button id="closeProfileBtn" class="p-2 text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      
      <form id="profileForm" class="space-y-4">
        <div class="flex flex-col items-center mb-6">
          <div class="relative group">
            <img id="editAvatarPreview" src="" class="w-24 h-24 rounded-full border-4 border-indigo-50 dark:border-indigo-900 object-cover shadow-lg" />
            <div class="absolute inset-0 bg-black/20 rounded-full opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity cursor-pointer">
              <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-gray-700 dark:text-gray-300 text-sm font-medium mb-1.5">Display Name</label>
          <input type="text" id="editName" required
            class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 dark:text-gray-100 focus:border-transparent transition" />
        </div>

        <div>
          <label class="block text-gray-700 dark:text-gray-300 text-sm font-medium mb-1.5">Avatar URL</label>
          <input type="url" id="editAvatarUrl" required
            class="w-full px-4 py-3 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl focus:ring-2 focus:ring-indigo-500 dark:text-gray-100 focus:border-transparent transition" />
          <p class="text-[10px] text-gray-400 mt-1">Provide a direct link to an image.</p>
        </div>

        <button type="submit"
          class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-semibold hover:bg-indigo-700 shadow-md transition-all active:scale-95 mt-4">
          Save Changes
        </button>
      </form>
    </div>
  </div>

  <!-- Main Chat Area -->
  <main class="flex-1 flex flex-col bg-white dark:bg-gray-900 h-full relative min-w-0">
    <!-- Chat Header -->
    <header id="chatHeader" class="h-16 border-b border-gray-100 dark:border-gray-800 flex items-center px-4 md:px-6 justify-between bg-white dark:bg-gray-800 z-10 hidden shrink-0">
      <div id="headerDefault" class="flex items-center space-x-3 min-w-0 flex-1">
        <button id="backBtn" class="md:hidden p-1 text-gray-500 mr-1 shrink-0">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg>
        </button>
        <img id="activeAvatar" src="" alt="Contact" class="w-10 h-10 rounded-full border border-gray-200 dark:border-gray-700 object-cover shrink-0" />
        <div class="min-w-0">
          <h2 id="activeName" class="text-sm font-bold text-gray-800 dark:text-gray-100 leading-tight truncate"></h2>
          <p id="activeStatus" class="text-xs text-gray-400">Online</p>
        </div>
      </div>

      <!-- In-Chat Search Bar -->
      <div id="headerSearch" class="hidden flex-1 flex items-center bg-gray-100 dark:bg-gray-700 rounded-xl px-3 mx-2">
        <svg class="w-4 h-4 text-gray-400 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        <input type="text" id="msgSearchInput" placeholder="Search in conversation..." 
          class="bg-transparent border-none focus:ring-0 text-sm w-full py-2 dark:text-gray-100 dark:placeholder-gray-400" />
        <button id="closeSearchBtn" class="p-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
          </svg>
        </button>
      </div>

      <div class="flex items-center space-x-1 sm:space-x-2 shrink-0">
        <button id="searchToggleBtn" class="p-2 text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors" title="Search Messages">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
        </button>
        <button id="deleteChatBtn" class="p-2 text-gray-400 hover:text-red-600 transition-colors" title="Delete Conversation">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
          </svg>
        </button>
        <button class="p-2 text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors hidden sm:block">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
          </svg>
        </button>
        <button class="p-2 text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path>
          </svg>
        </button>
      </div>
    </header>

    <!-- Messages Container -->
    <div id="messagesContainer" class="flex-1 overflow-y-auto p-4 md:p-6 bg-[#f8f9fa] dark:bg-gray-900 flex flex-col space-y-4 custom-scrollbar w-full">
      <!-- Welcome State -->
      <div id="welcomeState" class="h-full flex flex-col items-center justify-center text-center px-4">
        <div class="w-20 h-20 bg-indigo-100 dark:bg-indigo-900/50 rounded-3xl flex items-center justify-center mb-4">
          <svg class="w-10 h-10 text-indigo-600 dark:text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-800 dark:text-gray-100">Welcome to Chatly</h1>
        <p class="text-gray-500 dark:text-gray-400 text-sm mt-2 max-w-xs">Select a friend from the sidebar to start a secure conversation.</p>
      </div>
      <!-- Messages will be injected here -->
    </div>

    <!-- Message Input -->
    <footer id="messageInputArea" class="p-4 pb-10 md:pb-4 bg-white dark:bg-gray-800 border-t border-gray-100 dark:border-gray-700 hidden">
      <form id="messageForm" class="flex items-end space-x-3 max-w-4xl mx-auto">
        <div class="flex-1 relative bg-gray-100 dark:bg-gray-700 rounded-2xl p-1 flex items-center px-3">
          <button type="button" class="p-2 text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
          </button>
          <textarea id="messageText" placeholder="Write a message..." rows="1"
            class="flex-1 bg-transparent border-none focus:ring-0 py-3 px-2 text-sm resize-none max-h-32 dark:text-gray-100 dark:placeholder-gray-400 custom-scrollbar"></textarea>
          <input type="file" id="imageInput" accept="image/*" class="hidden" />
          <button type="button" id="attachBtn" class="p-2 text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path>
            </svg>
          </button>
        </div>
        <button type="submit" id="sendBtn"
          class="bg-indigo-600 text-white p-3.5 rounded-2xl hover:bg-indigo-700 transition-all transform active:scale-95 shadow-md shrink-0">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
          </svg>
        </button>
      </form>
    </footer>
  </main>

  <script>
    // Constants & State
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    let users = JSON.parse(localStorage.getItem('users')) || [];
    let messages = JSON.parse(localStorage.getItem('messages')) || [];
    let activeContact = null;

    // Check Authentication
    if (!currentUser) {
      window.location.href = 'login.html';
    }

    // DOM Elements
    const sidebar = document.getElementById('sidebar');
    const contactList = document.getElementById('contactList');
    const chatHeader = document.getElementById('chatHeader');
    const messagesContainer = document.getElementById('messagesContainer');
    const messageInputArea = document.getElementById('messageInputArea');
    const welcomeState = document.getElementById('welcomeState');
    const messageForm = document.getElementById('messageForm');
    const messageText = document.getElementById('messageText');
    const logoutBtn = document.getElementById('logoutBtn');
    const contactSearch = document.getElementById('contactSearch');
    const backBtn = document.getElementById('backBtn');
    const deleteChatBtn = document.getElementById('deleteChatBtn');
    const searchToggleBtn = document.getElementById('searchToggleBtn');
    const headerDefault = document.getElementById('headerDefault');
    const headerSearch = document.getElementById('headerSearch');
    const msgSearchInput = document.getElementById('msgSearchInput');
    const closeSearchBtn = document.getElementById('closeSearchBtn');
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = document.getElementById('sunIcon');
    const moonIcon = document.getElementById('moonIcon');
    const imageInput = document.getElementById('imageInput');
    const attachBtn = document.getElementById('attachBtn');
    const profileModal = document.getElementById('profileModal');
    const profileModalContent = document.getElementById('profileModalContent');
    const closeProfileBtn = document.getElementById('closeProfileBtn');
    const profileForm = document.getElementById('profileForm');
    const myAvatar = document.getElementById('myAvatar');
    const editAvatarPreview = document.getElementById('editAvatarPreview');
    const editName = document.getElementById('editName');
    const editAvatarUrl = document.getElementById('editAvatarUrl');

    // Helper: Sanitize HTML to prevent XSS
    function sanitize(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    let typingTimeout;
    function setTyping(isTyping) {
      if (!activeContact) return;
      localStorage.setItem(`typing_${currentUser.id}_${activeContact.id}`, isTyping);
      
      clearTimeout(typingTimeout);
      if (isTyping) {
        typingTimeout = setTimeout(() => setTyping(false), 3000);
      }
    }

    // Initialize UI
    function init() {
      // Theme Initialization
      if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
        sunIcon.classList.remove('hidden');
        moonIcon.classList.add('hidden');
      }

      document.getElementById('myName').textContent = currentUser.name;
      document.getElementById('myAvatar').src = currentUser.avatar;
      renderContacts();
      
      // Auto-resize textarea
      messageText.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';
        setTyping(true);
      });

      // Profile Modal Logic
      myAvatar.onclick = () => {
        editName.value = currentUser.name;
        editAvatarUrl.value = currentUser.avatar;
        editAvatarPreview.src = currentUser.avatar;
        profileModal.classList.remove('hidden');
        setTimeout(() => {
          profileModalContent.classList.remove('scale-95', 'opacity-0');
        }, 10);
      };

      closeProfileBtn.onclick = () => {
        profileModalContent.classList.add('scale-95', 'opacity-0');
        setTimeout(() => {
          profileModal.classList.add('hidden');
        }, 300);
      };

      profileForm.onsubmit = (e) => {
        e.preventDefault();
        const newName = editName.value.trim();
        const newAvatar = editAvatarUrl.value.trim();

        // Update current user
        currentUser.name = newName;
        currentUser.avatar = newAvatar;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));

        // Update in users array
        users = users.map(u => u.id === currentUser.id ? { ...u, name: newName, avatar: newAvatar } : u);
        localStorage.setItem('users', JSON.stringify(users));

        // Refresh UI
        document.getElementById('myName').textContent = newName;
        document.getElementById('myAvatar').src = newAvatar;
        renderContacts();
        
        closeProfileBtn.click();
      };

      editAvatarUrl.oninput = (e) => {
        editAvatarPreview.src = e.target.value || `https://ui-avatars.com/api/?name=${encodeURIComponent(editName.value)}`;
      };

      // Theme Toggle
      themeToggle.onclick = () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        sunIcon.classList.toggle('hidden');
        moonIcon.classList.toggle('hidden');
      };

      // Search Logic
      searchToggleBtn.onclick = () => {
        headerDefault.classList.add('hidden');
        searchToggleBtn.classList.add('hidden');
        headerSearch.classList.remove('hidden');
        msgSearchInput.focus();
      };

      closeSearchBtn.onclick = () => {
        headerSearch.classList.add('hidden');
        headerDefault.classList.remove('hidden');
        searchToggleBtn.classList.remove('hidden');
        msgSearchInput.value = '';
        renderMessages();
      };

      msgSearchInput.oninput = (e) => {
        renderMessages(e.target.value.trim());
      };

      // Delete Conversation
      deleteChatBtn.onclick = () => {
        if (!activeContact) return;
        if (confirm(`Are you sure you want to delete the conversation with ${activeContact.name}? This action cannot be undone.`)) {
          messages = messages.filter(m => 
            !((m.senderId === currentUser.id && m.receiverId === activeContact.id) ||
              (m.senderId === activeContact.id && m.receiverId === currentUser.id))
          );
          localStorage.setItem('messages', JSON.stringify(messages));
          renderMessages();
          renderContacts();
        }
      };

      // Image Attachment Logic
      attachBtn.onclick = () => imageInput.click();
      
      imageInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file || !activeContact) return;

        const reader = new FileReader();
        reader.onload = (event) => {
          const newMessage = {
            id: Date.now(),
            senderId: currentUser.id,
            receiverId: activeContact.id,
            type: 'image',
            text: event.target.result,
            timestamp: new Date().toISOString(),
            status: 'sent'
          };
          messages.push(newMessage);
          localStorage.setItem('messages', JSON.stringify(messages));
          renderMessages();
          renderContacts();
        };
        reader.readAsDataURL(file);
      };

      // Poll for updates (simulate real-time)
      setInterval(() => {
        const updatedMessages = JSON.parse(localStorage.getItem('messages')) || [];
        if (updatedMessages.length !== messages.length) {
          messages = updatedMessages;
          if (activeContact) renderMessages();
          renderContacts();
        }

        // Typing indicator
        if (activeContact) {
          const isTyping = localStorage.getItem(`typing_${activeContact.id}_${currentUser.id}`) === 'true';
          const statusEl = document.getElementById('activeStatus');
          if (isTyping) {
            statusEl.textContent = 'Typing...';
            statusEl.className = 'text-xs text-indigo-600 font-bold';
          } else {
            statusEl.textContent = 'Online';
            statusEl.className = 'text-xs text-gray-400';
          }
        }
      }, 1000);
    }

    // Render Contacts
    function renderContacts(filter = '') {
      contactList.innerHTML = '';
      const otherUsers = users.filter(u => u.id !== currentUser.id && u.name.toLowerCase().includes(filter.toLowerCase()));

      otherUsers.forEach(user => {
        const lastMsg = getLastMessage(user.id);
        const unreadCount = messages.filter(m => m.senderId === user.id && m.receiverId === currentUser.id && m.status !== 'read').length;
        const contactEl = document.createElement('div');
        contactEl.className = `flex items-center space-x-3 p-3 rounded-xl cursor-pointer transition-all hover:bg-gray-50 dark:hover:bg-gray-700/50 ${activeContact?.id === user.id ? 'bg-indigo-50 dark:bg-indigo-900/30' : ''}`;
        
        contactEl.innerHTML = `
          <div class="relative shrink-0">
            <img src="${user.avatar}" class="w-12 h-12 rounded-full border border-gray-100 dark:border-gray-700 object-cover" />
            <div class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white dark:border-gray-800 rounded-full"></div>
          </div>
          <div class="flex-1 overflow-hidden">
            <div class="flex justify-between items-baseline">
              <h3 class="text-sm font-semibold text-gray-800 dark:text-gray-100 truncate">${user.name}</h3>
              <span class="text-[10px] text-gray-400 dark:text-gray-500">${lastMsg ? formatTime(lastMsg.timestamp) : ''}</span>
            </div>
            <div class="flex justify-between items-center">
              <p class="text-xs ${unreadCount > 0 ? 'text-indigo-600 dark:text-indigo-400 font-bold' : 'text-gray-500 dark:text-gray-400'} truncate flex-1">
                ${lastMsg ? (lastMsg.type === 'image' ? '📷 Photo' : sanitize(lastMsg.text)) : 'Start a conversation'}
              </p>
              ${unreadCount > 0 ? `<span class="bg-indigo-600 text-white text-[10px] px-1.5 py-0.5 rounded-full ml-2 min-w-[18px] text-center">${unreadCount}</span>` : ''}
            </div>
          </div>
        `;
        
        contactEl.onclick = () => selectContact(user);
        contactList.appendChild(contactEl);
      });
    }

    // Select Contact
    function selectContact(user) {
      activeContact = user;
      
      // Update UI state
      welcomeState.classList.add('hidden');
      chatHeader.classList.remove('hidden');
      messageInputArea.classList.remove('hidden');
      
      document.getElementById('activeName').textContent = user.name;
      document.getElementById('activeAvatar').src = user.avatar;
      document.getElementById('activeStatus').textContent = 'Online';
      
      // Mobile sidebar toggle
      sidebar.classList.add('-translate-x-full');
      
      renderMessages();
      renderContacts(); // Refresh selection visual
    }

    // Render Messages
    function renderMessages(filterText = '') {
      const container = messagesContainer;
      
      // Mark incoming messages as read
      let changed = false;
      messages = messages.map(m => {
        if (m.receiverId === currentUser.id && m.senderId === activeContact.id && m.status !== 'read') {
          m.status = 'read';
          changed = true;
        }
        return m;
      });
      if (changed) localStorage.setItem('messages', JSON.stringify(messages));

      container.innerHTML = '';
      
      let conversation = messages.filter(m => 
        (m.senderId === currentUser.id && m.receiverId === activeContact.id) ||
        (m.senderId === activeContact.id && m.receiverId === currentUser.id)
      );

      // Apply search filter if present
      if (filterText) {
        conversation = conversation.filter(m => 
          m.type !== 'image' && m.text.toLowerCase().includes(filterText.toLowerCase())
        );
      }

      if (conversation.length === 0) {
        container.innerHTML = `
          <div class="flex-1 flex flex-col items-center justify-center opacity-50">
            <div class="p-3 bg-gray-200 dark:bg-gray-700 rounded-full mb-2">
              <svg class="w-6 h-6 text-gray-500 dark:text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
              </svg>
            </div>
            <p class="text-xs text-gray-500 dark:text-gray-400">${filterText ? 'No messages found' : 'Messages are end-to-end encrypted'}</p>
          </div>
        `;
      }

      let lastDate = null;
      conversation.forEach(msg => {
        const msgDate = new Date(msg.timestamp).toDateString();
        if (msgDate !== lastDate) {
          const dateHeader = document.createElement('div');
          dateHeader.className = 'flex justify-center my-4';
          dateHeader.innerHTML = `
            <span class="bg-gray-200 dark:bg-gray-800 text-gray-500 dark:text-gray-400 text-[10px] px-3 py-1 rounded-full uppercase tracking-wider font-semibold">
              ${formatDateHeader(msg.timestamp)}
            </span>
          `;
          container.appendChild(dateHeader);
          lastDate = msgDate;
        }

        const isMe = msg.senderId === currentUser.id;
        const msgEl = document.createElement('div');
        msgEl.className = `flex ${isMe ? 'justify-end' : 'justify-start'} mb-1 animate-fade-in`;
        
        let content = '';
        if (msg.type === 'image') {
          content = `<img src="${msg.text}" class="rounded-2xl max-w-full h-auto shadow-sm border border-gray-100 dark:border-gray-700" />`;
        } else {
          content = `<div class="px-4 py-2.5 rounded-2xl text-sm shadow-sm ${
            isMe 
              ? 'bg-indigo-600 text-white rounded-br-none' 
              : 'bg-white dark:bg-gray-800 text-gray-800 dark:text-gray-100 border border-gray-100 dark:border-gray-700 rounded-bl-none'
          }">
            ${sanitize(msg.text)}
          </div>`;
        }
        
        msgEl.innerHTML = `
          <div class="max-w-[80%] md:max-w-[70%] group relative">
            ${content}
            <div class="text-[10px] text-gray-400 dark:text-gray-500 mt-1 px-1 flex items-center ${isMe ? 'justify-end' : 'justify-start'} space-x-1">
              <span>${formatTime(msg.timestamp)}</span>
              ${isMe ? `
                <span class="${msg.status === 'read' ? 'text-indigo-500 dark:text-indigo-400' : 'text-gray-300 dark:text-gray-600'}">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                    ${msg.status === 'read' ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7" class="-translate-x-1"></path>' : ''}
                  </svg>
                </span>
              ` : ''}
            </div>
            <!-- Delete single message -->
            <button onclick="deleteSingleMessage(${msg.id})" 
              class="absolute top-0 ${isMe ? '-left-8' : '-right-8'} p-1 text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all duration-200"
              title="Delete message">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
              </svg>
            </button>
          </div>
        `;
        container.appendChild(msgEl);
      });
      
      // Scroll to bottom
      container.scrollTop = container.scrollHeight;
    }

    // Send Message
    messageForm.onsubmit = (e) => {
      e.preventDefault();
      const text = messageText.value.trim();
      if (!text || !activeContact) return;

      const newMessage = {
        id: Date.now(),
        senderId: currentUser.id,
        receiverId: activeContact.id,
        text: text,
        timestamp: new Date().toISOString(),
        status: 'sent'
      };

      messages.push(newMessage);
      localStorage.setItem('messages', JSON.stringify(messages));
      
      messageText.value = '';
      messageText.style.height = 'auto';
      renderMessages();
      renderContacts();
    };

    // Helper: Last Message
    function getLastMessage(userId) {
      return messages
        .filter(m => (m.senderId === currentUser.id && m.receiverId === userId) || (m.senderId === userId && m.receiverId === currentUser.id))
        .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0];
    }

    // Helper: Format Time
    function formatTime(isoStr) {
      const date = new Date(isoStr);
      return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Helper: Format Date Header
    function formatDateHeader(isoStr) {
      const date = new Date(isoStr);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);

      if (date.toDateString() === today.toDateString()) return 'Today';
      if (date.toDateString() === yesterday.toDateString()) return 'Yesterday';
      return date.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // Logout
    logoutBtn.onclick = () => {
      localStorage.removeItem('currentUser');
      window.location.href = 'login.html';
    };

    // Search
    contactSearch.oninput = (e) => {
      renderContacts(e.target.value);
    };

    // Mobile Back Button
    backBtn.onclick = () => {
      sidebar.classList.remove('-translate-x-full');
    };

    // Delete Single Message
    window.deleteSingleMessage = (msgId) => {
      messages = messages.filter(m => m.id !== msgId);
      localStorage.setItem('messages', JSON.stringify(messages));
      renderMessages();
      renderContacts();
    };

    init();
  </script>
</body>
</html>
