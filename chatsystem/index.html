<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Welcome | Chat App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Redirect to chat if already logged in
    if (localStorage.getItem('currentUser')) {
      window.location.href = 'chat.html';
    }
  </script>
</head>

<body class="bg-gradient-to-br from-blue-600 to-indigo-700 min-h-screen flex items-center justify-center px-4 py-8">

  <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-6 sm:p-10 text-center">

    <!-- Logo / Icon -->
    <div class="w-16 h-16 sm:w-20 sm:h-20 mx-auto mb-6 rounded-full bg-blue-100 flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 sm:w-10 sm:h-10 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.77 9.77 0 01-4-.8L3 20l1.8-4A7.96 7.96 0 013 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
      </svg>
    </div>

    <!-- Text -->
    <h1 class="text-2xl sm:text-3xl font-bold text-gray-800 mb-2">
      Welcome to Chatly
    </h1>

    <p class="text-gray-500 text-sm sm:text-base mb-8">
      Fast, simple, and secure messaging.  
      Stay connected anytime, anywhere.
    </p>

    <!-- Button -->
    <a href="login.html"
       class="block w-full bg-blue-600 text-white py-3 rounded-full font-semibold text-lg hover:bg-blue-700 transition active:scale-95">
      Start Chatting
    </a>

    <!-- Footer text -->
    <p class="text-xs text-gray-400 mt-6">
      © 2026 Chatly. All rights reserved.
    </p>

  </div>

</body>
</html>
