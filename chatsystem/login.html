<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Login | Chat App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen flex items-center justify-center px-4 py-8">

  <div class="bg-white/80 backdrop-blur-lg w-full max-w-md rounded-3xl shadow-2xl p-6 sm:p-10 border border-white/20">
    
    <!-- Logo/Header -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 sm:w-16 sm:h-16 bg-gradient-to-br from-blue-600 to-indigo-600 rounded-2xl mx-auto mb-4 flex items-center justify-center">
        <svg class="w-7 h-7 sm:w-8 sm:h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
        </svg>
      </div>
      <h1 class="text-xl sm:text-2xl font-bold text-gray-800">Welcome Back</h1>
      <p class="text-gray-500 text-xs sm:text-sm mt-1">Sign in to continue chatting</p>
    </div>

    <!-- Tabs -->
    <div class="flex mb-6 bg-gray-100 rounded-2xl p-1">
      <button id="loginTab" class="w-1/2 text-center font-semibold text-white bg-gradient-to-r from-blue-600 to-indigo-600 rounded-xl py-2.5 transition-all duration-300 shadow-md">
        Login
      </button>
      <button id="signupTab" class="w-1/2 text-center font-semibold text-gray-600 rounded-xl py-2.5 transition-all duration-300">
        Sign Up
      </button>
    </div>

    <!-- Alert Messages -->
    <div id="alertContainer" class="mb-4 hidden">
      <div id="alertBox" class="p-4 rounded-xl text-sm font-medium"></div>
    </div>

    <!-- Forms Container -->
    <div class="relative overflow-hidden">

      <!-- Login Form -->
      <form id="loginForm" class="transition-all duration-500">
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-medium mb-2">Email</label>
          <input type="email" id="loginEmail" required
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition" 
            placeholder="you@example.com" />
        </div>
        
        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-medium mb-2">Password</label>
          <div class="relative">
            <input type="password" id="loginPassword" required
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition pr-12" 
              placeholder="••••••••" />
            <button type="button" onclick="togglePassword('loginPassword')" class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-gray-400 hover:text-gray-600 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c3.478 0 6.522 1.891 8.51 4.755M21.542 12C20.268 16.057 16.477 19 12 19c-3.478 0-6.522-1.891-8.51-4.755"></path>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit"
          class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white py-3.5 rounded-xl font-semibold hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all duration-200">
          Sign In
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signupForm" class="hidden transition-all duration-500">
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-medium mb-2">Full Name</label>
          <input type="text" id="signupName" required
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" 
            placeholder="John Doe" />
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-medium mb-2">Email</label>
          <input type="email" id="signupEmail" required
            class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition" 
            placeholder="you@example.com" />
        </div>
        
        <div class="mb-6">
          <label class="block text-gray-700 text-sm font-medium mb-2">Password</label>
          <div class="relative">
            <input type="password" id="signupPassword" required minlength="6"
              class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition pr-12" 
              placeholder="••••••••" />
            <button type="button" onclick="togglePassword('signupPassword')" class="absolute right-3 top-1/2 -translate-y-1/2 p-2 text-gray-400 hover:text-gray-600 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c3.478 0 6.522 1.891 8.51 4.755M21.542 12C20.268 16.057 16.477 19 12 19c-3.478 0-6.522-1.891-8.51-4.755"></path>
              </svg>
            </button>
          </div>
          <p class="text-xs text-gray-500 mt-1">At least 6 characters</p>
        </div>

        <button type="submit"
          class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white py-3.5 rounded-xl font-semibold hover:shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all duration-200">
          Create Account
        </button>
      </form>

    </div>

    <!-- Footer -->
    <div class="mt-6 text-center text-xs text-gray-500">
      <p>By continuing, you agree to our Terms & Privacy Policy</p>
    </div>

  </div>

  <script>
    const loginTab = document.getElementById("loginTab");
    const signupTab = document.getElementById("signupTab");
    const loginForm = document.getElementById("loginForm");
    const signupForm = document.getElementById("signupForm");
    const alertContainer = document.getElementById("alertContainer");
    const alertBox = document.getElementById("alertBox");

    // Initialize users from localStorage or seed with defaults
    let users = JSON.parse(localStorage.getItem('users')) || [];

    if (users.length === 0) {
      users = [
        {
          id: 1,
          name: "Alice",
          email: "alice@example.com",
          password: "password123",
          avatar: "https://ui-avatars.com/api/?name=Alice&background=0D8ABC&color=fff",
          createdAt: new Date().toISOString()
        },
        {
          id: 2,
          name: "Bob",
          email: "bob@example.com",
          password: "password123",
          avatar: "https://ui-avatars.com/api/?name=Bob&background=6366f1&color=fff",
          createdAt: new Date().toISOString()
        },
        {
          id: 3,
          name: "zors",
          email: "zors@example.com",
          password: "password123",
          avatar: "https://ui-avatars.com/api/?name=Zors&background=6366f1&color=fff",
          createdAt: new Date().toISOString()
        }
      ];
      localStorage.setItem('users', JSON.stringify(users));
    }

    // Tab switching
    signupTab.onclick = () => {
      loginTab.classList.remove("text-white", "bg-gradient-to-r", "from-blue-600", "to-indigo-600", "shadow-md");
      loginTab.classList.add("text-gray-600");
      
      signupTab.classList.add("text-white", "bg-gradient-to-r", "from-blue-600", "to-indigo-600", "shadow-md");
      signupTab.classList.remove("text-gray-600");

      loginForm.classList.add("hidden");
      signupForm.classList.remove("hidden");
      hideAlert();
    };

    loginTab.onclick = () => {
      signupTab.classList.remove("text-white", "bg-gradient-to-r", "from-blue-600", "to-indigo-600", "shadow-md");
      signupTab.classList.add("text-gray-600");
      
      loginTab.classList.add("text-white", "bg-gradient-to-r", "from-blue-600", "to-indigo-600", "shadow-md");
      loginTab.classList.remove("text-gray-600");

      signupForm.classList.add("hidden");
      loginForm.classList.remove("hidden");
      hideAlert();
    };

    // Alert functions
    function showAlert(message, type = 'success') {
      alertContainer.classList.remove("hidden");
      alertBox.textContent = message;
      
      if (type === 'success') {
        alertBox.className = "p-4 rounded-xl text-sm font-medium bg-green-100 text-green-800 border border-green-200";
      } else {
        alertBox.className = "p-4 rounded-xl text-sm font-medium bg-red-100 text-red-800 border border-red-200";
      }
    }

    function hideAlert() {
      alertContainer.classList.add("hidden");
    }

    // Toggle Password Visibility
    window.togglePassword = (id) => {
      const input = document.getElementById(id);
      input.type = input.type === 'password' ? 'text' : 'password';
    };

    // Signup handler
    signupForm.onsubmit = (e) => {
      e.preventDefault();
      
      const name = document.getElementById("signupName").value.trim();
      const email = document.getElementById("signupEmail").value.trim().toLowerCase();
      const password = document.getElementById("signupPassword").value;

      // Check if user already exists
      if (users.find(u => u.email === email)) {
        showAlert("An account with this email already exists!", 'error');
        return;
      }

      // Create new user
      const newUser = {
        id: Date.now(),
        name: name,
        email: email,
        password: password,
        avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random`,
        createdAt: new Date().toISOString()
      };

      users.push(newUser);
      localStorage.setItem('users', JSON.stringify(users));
      
      showAlert("Account created successfully! Please login.", 'success');
      signupForm.reset();
      
      setTimeout(() => {
        loginTab.click();
      }, 1500);
    };

    // Login handler
    loginForm.onsubmit = (e) => {
      e.preventDefault();
      
      const email = document.getElementById("loginEmail").value.trim().toLowerCase();
      const password = document.getElementById("loginPassword").value;

      // Find user
      const user = users.find(u => u.email === email && u.password === password);

      if (user) {
        // Store current user session
        localStorage.setItem('currentUser', JSON.stringify(user));
        
        showAlert(`Welcome back, ${user.name}! Redirecting...`, 'success');
        
        setTimeout(() => {
          window.location.href = 'chat.html';
        }, 1000);
      } else {
        showAlert("Invalid email or password!", 'error');
      }
    };
  </script>

</body>
</html>
